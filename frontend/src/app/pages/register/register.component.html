<main class="h-screen overflow-y-auto bg-gray-100 transition-colors duration-500 dark:bg-main-dark-bg">
    <div class="flex min-h-full items-center justify-center p-5 sm:p-8">
    <div class="w-full max-w-lg shrink-0 animate-appear opacity-0">
        <div class="mb-6 flex items-center justify-center gap-3 text-gray-800 dark:text-gray-300">
            <img src="../../../assets/img/logo.png" alt="Logo Poker HL" class="h-11 w-11">
            <span class="text-xl font-bold">Poker HL</span>
        </div>

        <section class="rounded-md bg-white p-6 shadow-xl transition-colors duration-500 dark:bg-secondary-dark-bg sm:p-8"
            aria-labelledby="register-title">
            <header class="mb-6">
                <h1 id="register-title" class="m-0 text-3xl font-bold text-gray-800 transition-colors duration-500 dark:text-gray-300">
                    Créer un compte
                </h1>
                <p class="m-0 mt-1 text-sm text-gray-500 transition-colors duration-500 dark:text-gray-400">
                    Créez votre espace pour enregistrer vos situations et vos grilles.
                </p>
            </header>

            <form (ngSubmit)="register()" class="space-y-5">
                <div>
                    <label for="register-name" class="mb-2 block text-sm font-medium text-gray-800 transition-colors duration-500 dark:text-gray-300">
                        Nom affiché
                    </label>
                    <div class="relative flex items-center">
                        <i class="fa-solid fa-user pointer-events-none absolute left-4 text-sm text-gray-400" aria-hidden="true"></i>
                        <input id="register-name" name="displayName" [(ngModel)]="displayName" type="text"
                            placeholder="Votre nom" autocomplete="nickname" [maxlength]="16"
                            class="box-border w-full border-gray-300 bg-white pl-11 text-gray-800 placeholder:text-gray-400 transition-colors duration-500 dark:border-gray-600 dark:bg-main-dark-bg dark:text-gray-300 dark:placeholder:text-gray-500"
                            pInputText />
                    </div>
                </div>

                <div>
                    <label for="register-email" class="mb-2 block text-sm font-medium text-gray-800 transition-colors duration-500 dark:text-gray-300">
                        Adresse email
                    </label>
                    <div class="relative flex items-center">
                        <i class="fa-solid fa-envelope pointer-events-none absolute left-4 text-sm text-gray-400" aria-hidden="true"></i>
                        <input id="register-email" name="email" [(ngModel)]="email" type="email"
                            placeholder="vous@exemple.fr" autocomplete="email"
                            class="box-border w-full border-gray-300 bg-white pl-11 text-gray-800 placeholder:text-gray-400 transition-colors duration-500 dark:border-gray-600 dark:bg-main-dark-bg dark:text-gray-300 dark:placeholder:text-gray-500"
                            pInputText />
                    </div>
                </div>

                <div>
                    <label for="register-password" class="mb-2 block text-sm font-medium text-gray-800 transition-colors duration-500 dark:text-gray-300">
                        Mot de passe
                    </label>
                    <div class="relative flex items-center">
                        <i class="fa-solid fa-lock pointer-events-none absolute left-4 text-sm text-gray-400" aria-hidden="true"></i>
                        <input id="register-password" name="password" [(ngModel)]="password"
                            [type]="passwordFieldType" placeholder="6 caractères minimum" autocomplete="new-password"
                            class="box-border w-full border-gray-300 bg-white pl-11 pr-12 text-gray-800 placeholder:text-gray-400 transition-colors duration-500 dark:border-gray-600 dark:bg-main-dark-bg dark:text-gray-300 dark:placeholder:text-gray-500"
                            pInputText />
                        <button type="button" (click)="togglePasswordVisibility('new')"
                            class="absolute right-2 flex h-9 w-9 items-center justify-center rounded-full border-0 bg-transparent text-gray-500 transition-colors duration-500 hover:bg-gray-100 hover:text-gray-800 dark:text-gray-400 dark:hover:bg-gray-700 dark:hover:text-gray-200 cursor-pointer"
                            [attr.aria-label]="passwordFieldType === 'password' ? 'Afficher le mot de passe' : 'Masquer le mot de passe'">
                            <i class="fa-solid" [class.fa-eye]="passwordFieldType === 'password'"
                                [class.fa-eye-slash]="passwordFieldType === 'text'" aria-hidden="true"></i>
                        </button>
                    </div>
                </div>

                <div>
                    <label for="register-password-confirmation" class="mb-2 block text-sm font-medium text-gray-800 transition-colors duration-500 dark:text-gray-300">
                        Confirmer le mot de passe
                    </label>
                    <div class="relative flex items-center">
                        <i class="fa-solid fa-lock pointer-events-none absolute left-4 text-sm text-gray-400" aria-hidden="true"></i>
                        <input id="register-password-confirmation" name="passwordConfirmation"
                            [(ngModel)]="passwordConfirmation" [type]="passwordFieldTypeConfirm"
                            placeholder="Saisissez-le une seconde fois" autocomplete="new-password"
                            class="box-border w-full border-gray-300 bg-white pl-11 pr-12 text-gray-800 placeholder:text-gray-400 transition-colors duration-500 dark:border-gray-600 dark:bg-main-dark-bg dark:text-gray-300 dark:placeholder:text-gray-500"
                            pInputText />
                        <button type="button" (click)="togglePasswordVisibility('confirm')"
                            class="absolute right-2 flex h-9 w-9 items-center justify-center rounded-full border-0 bg-transparent text-gray-500 transition-colors duration-500 hover:bg-gray-100 hover:text-gray-800 dark:text-gray-400 dark:hover:bg-gray-700 dark:hover:text-gray-200 cursor-pointer"
                            [attr.aria-label]="passwordFieldTypeConfirm === 'password' ? 'Afficher la confirmation' : 'Masquer la confirmation'">
                            <i class="fa-solid" [class.fa-eye]="passwordFieldTypeConfirm === 'password'"
                                [class.fa-eye-slash]="passwordFieldTypeConfirm === 'text'" aria-hidden="true"></i>
                        </button>
                    </div>
                </div>

                <button type="submit" [disabled]="isSubmitting"
                    class="inline-flex h-12 w-full items-center justify-center rounded-md border-0 bg-gray-800 px-5 text-base font-medium text-white shadow transition-colors duration-500 hover:bg-gray-700 disabled:cursor-not-allowed disabled:opacity-50 dark:bg-gray-700 dark:text-gray-300 dark:hover:bg-gray-600 cursor-pointer">
                    @if (isSubmitting) {
                    <i class="fa-solid fa-circle-notch fa-spin mr-2" aria-hidden="true"></i>
                    Création…
                    } @else {
                    Créer mon compte
                    }
                </button>
            </form>

            <p class="m-0 mt-6 text-center text-sm text-gray-500 transition-colors duration-500 dark:text-gray-400">
                Vous avez déjà un compte ?
                <button type="button" (click)="commonService.redirectTo('login')"
                    class="border-0 bg-transparent p-0 font-semibold text-gray-700 transition-colors duration-500 hover:text-gray-900 hover:underline dark:text-gray-300 dark:hover:text-white cursor-pointer">
                    Se connecter
                </button>
            </p>
        </section>
    </div>
    </div>
</main>
