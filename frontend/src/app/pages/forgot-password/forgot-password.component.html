<main class="h-screen overflow-y-auto bg-gray-100 transition-colors duration-500 dark:bg-main-dark-bg">
    <div class="flex min-h-full items-center justify-center p-5 sm:p-8">
    <div class="w-full max-w-md shrink-0 animate-appear opacity-0">
        <div class="mb-6 flex items-center justify-center gap-3 text-gray-800 dark:text-gray-300">
            <img src="../../../assets/img/logo.png" alt="Logo Poker HL" class="h-11 w-11">
            <span class="text-xl font-bold">Poker HL</span>
        </div>

        <section class="rounded-md bg-white p-6 shadow-xl transition-colors duration-500 dark:bg-secondary-dark-bg sm:p-8"
            aria-labelledby="forgot-password-title">
            <header class="mb-6">
                <h1 id="forgot-password-title" class="m-0 text-3xl font-bold text-gray-800 transition-colors duration-500 dark:text-gray-300">
                    Mot de passe oublié
                </h1>
                <p class="m-0 mt-1 text-sm leading-relaxed text-gray-500 transition-colors duration-500 dark:text-gray-400">
                    Indiquez votre adresse email pour recevoir un lien de réinitialisation.
                </p>
            </header>

            <form (ngSubmit)="resetPassword()" class="space-y-5">
                <div>
                    <label for="reset-email" class="mb-2 block text-sm font-medium text-gray-800 transition-colors duration-500 dark:text-gray-300">
                        Adresse email
                    </label>
                    <div class="relative flex items-center">
                        <i class="fa-solid fa-envelope pointer-events-none absolute left-4 text-sm text-gray-400" aria-hidden="true"></i>
                        <input id="reset-email" name="email" [(ngModel)]="email" type="email"
                            placeholder="vous@exemple.fr" autocomplete="email"
                            class="box-border w-full border-gray-300 bg-white pl-11 text-gray-800 placeholder:text-gray-400 transition-colors duration-500 dark:border-gray-600 dark:bg-main-dark-bg dark:text-gray-300 dark:placeholder:text-gray-500"
                            pInputText />
                    </div>
                </div>

                <button type="submit" [disabled]="isSending"
                    class="inline-flex h-12 w-full items-center justify-center rounded-md border-0 bg-gray-800 px-5 text-base font-medium text-white shadow transition-colors duration-500 hover:bg-gray-700 disabled:cursor-not-allowed disabled:opacity-50 dark:bg-gray-700 dark:text-gray-300 dark:hover:bg-gray-600 cursor-pointer">
                    @if (isSending) {
                    <i class="fa-solid fa-circle-notch fa-spin mr-2" aria-hidden="true"></i>
                    Envoi…
                    } @else {
                    Envoyer le lien
                    }
                </button>
            </form>

            <button type="button" (click)="commonService.redirectTo('login')"
                class="mt-5 inline-flex h-11 w-full items-center justify-center rounded-md border-0 bg-transparent px-4 text-sm font-medium text-gray-600 transition-colors duration-500 hover:bg-gray-100 dark:text-gray-400 dark:hover:bg-gray-700 dark:hover:text-gray-200 cursor-pointer">
                <i class="fa-solid fa-arrow-left mr-2" aria-hidden="true"></i>
                Retour à la connexion
            </button>
        </section>
    </div>
    </div>
</main>
