<h3 class="text-4xl font-bold md:text-5xl text-gray-800 dark:text-gray-300 animate-appear opacity-0 m-0">
    Ranges personnalisées</h3>
<p class="text-gray-500 dark:text-gray-400 text-xl mt-2 mb-10 text-left animate-appear opacity-0">
    Créez et organisez vos pages de ranges.</p>

<div class="animate-appear opacity-0 animation-delay-100 w-11/12 min-w-[525px] mx-auto">
    <div class="flex items-center gap-4 mb-8">
        <div class="relative w-96 max-w-full">
            <input [(ngModel)]="newPageName" type="text" placeholder="Nom de la page" name="newPageName"
                class="w-full bg-white text-gray-800 placeholder:text-gray-400 transition-colors duration-500 dark:border-gray-700 dark:bg-secondary-dark-bg dark:text-gray-300 dark:placeholder:text-gray-500"
                autocomplete="off" pInputText />
        </div>
        <div (click)="createPage()"
            class="inline-flex h-12 items-center justify-center rounded-md bg-gray-800 text-white dark:text-gray-300 hover:bg-gray-700 dark:bg-gray-700 dark:hover:bg-gray-600 px-5 text-base font-medium shadow transition-colors cursor-pointer">
            <i class="fa-solid fa-plus mr-3 h-4 w-4"></i>
            Créer
        </div>
    </div>

    <div class="bg-white dark:bg-secondary-dark-bg shadow-lg rounded-md overflow-hidden">
        <table class="w-full border-collapse">
            <thead>
                <tr class="text-left text-gray-800 dark:text-gray-300">
                    <th class="p-4">Nom</th>
                    <th class="p-4">Blocs</th>
                    <th class="p-4 w-16"></th>
                    <th class="p-4 w-16"></th>
                    <th class="p-4 w-16"></th>
                </tr>
            </thead>
            <tbody>
                @for (page of rangePages; track page.id) {
                    <tr class="border-t border-gray-200 dark:border-gray-700 text-gray-800 dark:text-gray-300">
                        <td class="p-4">{{ page.name }}</td>
                        <td class="p-4">{{ page.blocks.length }}</td>
                        <td class="p-4">
                            <i class="fa-solid fa-eye cursor-pointer p-3 dui-btn-ghost rounded-full"
                                (click)="openPage(page.id)"></i>
                        </td>
                        <td class="p-4">
                            <i class="fa-solid fa-clone cursor-pointer p-3 dui-btn-ghost rounded-full"
                                (click)="duplicatePage(page.id)"></i>
                        </td>
                        <td class="p-4">
                            <i class="fa-solid fa-trash-can cursor-pointer p-3 dui-btn-ghost rounded-full"
                                (click)="removePage(page.id)"></i>
                        </td>
                    </tr>
                } @empty {
                    <tr class="border-t border-gray-200 dark:border-gray-700 text-gray-800 dark:text-gray-300">
                        <td colspan="5" class="p-4">Aucune page trouvée.</td>
                    </tr>
                }
            </tbody>
        </table>
    </div>
</div>
