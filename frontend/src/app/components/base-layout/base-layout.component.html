<section class="flex h-screen overflow-hidden bg-gray-100 dark:bg-main-dark-bg transition-colors duration-500">
    @if (!isGridEditor) {
        <app-sidebar></app-sidebar>
    }
    <div [ngClass]="{
            'ml-20': !isGridEditor && commonService.isCollapsed,
            'ml-56': !isGridEditor && !commonService.isCollapsed,
            'py-8': !isGridEditor,
            'px-14': !isGridEditor,
            'p-0': isGridEditor
        }"
        class="app-scrollbar flex-grow h-screen overflow-y-auto transition-all duration-500 text-black">
        <router-outlet></router-outlet>
    </div>
</section>
